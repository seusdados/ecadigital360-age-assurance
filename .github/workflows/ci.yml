name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  packages-typecheck:
    name: Typecheck packages/*
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.14.4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile=false

      - name: Typecheck @agekey/shared
        run: pnpm --filter @agekey/shared typecheck

      - name: Typecheck @agekey/adapter-contracts
        run: pnpm --filter @agekey/adapter-contracts typecheck

  edge-functions-deno:
    name: Edge Functions (Deno tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Deno version
        run: deno --version

      - name: Cache dependencies
        working-directory: supabase/functions
        run: deno cache _tests/tokens.test.ts _tests/policy-engine.test.ts _tests/fallback-adapter.test.ts _tests/jws-generic.test.ts

      - name: Deno test — tokens (verbose)
        working-directory: supabase/functions
        run: |
          set -o pipefail
          deno test -A --no-check _tests/tokens.test.ts 2>&1 | tee /tmp/tokens.log || {
            echo "::group::tokens.test.ts FAILED — full log"
            cat /tmp/tokens.log
            echo "::endgroup::"
            exit 1
          }

      - name: Deno test — policy-engine
        working-directory: supabase/functions
        run: deno test -A --no-check _tests/policy-engine.test.ts

      - name: Deno test — fallback-adapter
        working-directory: supabase/functions
        run: deno test -A --no-check _tests/fallback-adapter.test.ts

      - name: Deno test — jws-generic
        working-directory: supabase/functions
        run: deno test -A --no-check _tests/jws-generic.test.ts

      - name: Deno typecheck (Edge Functions)
        working-directory: supabase/functions
        run: |
          deno check _shared/tokens.ts
          deno check _shared/policy-engine.ts
          deno check _shared/adapters/index.ts
          deno check _shared/adapters/fallback.ts
          deno check _shared/adapters/vc.ts
          deno check _shared/adapters/zkp.ts
          deno check _shared/adapters/gateway.ts
