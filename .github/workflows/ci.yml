name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  packages-typecheck:
    name: Typecheck packages/*
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.14.4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile=false

      - name: Typecheck @agekey/shared
        run: pnpm --filter @agekey/shared typecheck

      - name: Typecheck @agekey/adapter-contracts
        run: pnpm --filter @agekey/adapter-contracts typecheck

  admin-build:
    name: Admin (Next.js build + typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.14.4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile=false

      - name: Typecheck @agekey/admin
        run: pnpm --filter @agekey/admin typecheck

      - name: Build @agekey/admin
        env:
          # Build-time public env vars. Real values configured in Vercel.
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-placeholder
          NEXT_PUBLIC_AGEKEY_API_BASE: https://example.supabase.co/functions/v1
          NEXT_PUBLIC_AGEKEY_ISSUER: https://staging.agekey.com.br
          NEXT_PUBLIC_APP_URL: http://localhost:3000
        run: pnpm --filter @agekey/admin build

  edge-functions-deno:
    name: Edge Functions (Deno tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Deno version
        run: deno --version

      - name: Cache dependencies
        working-directory: supabase/functions
        run: deno cache _tests/tokens.test.ts _tests/policy-engine.test.ts _tests/fallback-adapter.test.ts _tests/jws-generic.test.ts

      - name: Deno test (Edge Functions unit suites)
        working-directory: supabase/functions
        # Roda apenas as suites unit (excluindo a integração rls-cross-tenant,
        # que requer Postgres + auth schema e roda em job próprio).
        run: |
          deno test -A --no-check \
            _tests/tokens.test.ts \
            _tests/policy-engine.test.ts \
            _tests/fallback-adapter.test.ts \
            _tests/jws-generic.test.ts \
            _tests/credentials.test.ts \
            _tests/zkp-adapter.test.ts \
            _tests/gateway-adapter.test.ts

      - name: Deno typecheck (Edge Functions)
        working-directory: supabase/functions
        run: |
          deno check _shared/tokens.ts
          deno check _shared/policy-engine.ts
          deno check _shared/adapters/index.ts
          deno check _shared/adapters/fallback.ts
          deno check _shared/adapters/vc.ts
          deno check _shared/adapters/zkp.ts
          deno check _shared/adapters/gateway.ts

  privacy-guard-fuzz:
    name: Privacy guard fuzz (AK-P0-05)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.14.4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile=false

      - name: Vitest — privacy-guard suite
        # Esse passo é go-live blocker (AK-P0-05). Falha o merge se qualquer
        # variação canônica de chave PII passar pelo guard.
        run: pnpm --filter @agekey/shared test

      - name: Vitest — adapter-contracts suite
        # Roda fuzz / contract tests do gateway-providers e zkp-bbs-contract,
        # adicionados pelo production-readiness pack.
        run: pnpm --filter @agekey/adapter-contracts test

  rls-cross-tenant:
    name: Cross-tenant RLS (AK-P0-04)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      # Vanilla postgres:15 (Debian-based) — aceita os env vars padrão e o
      # entrypoint padrão. pg_cron/pgsodium/pg_net são stubados pelo
      # _rls_pre_migrate.sql; ver script para detalhes.
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        ports:
          - 54322:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 30
    env:
      PGHOST: 127.0.0.1
      PGPORT: '54322'
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: postgres
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install psql client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 60); do
            pg_isready -h 127.0.0.1 -p 54322 -U postgres && break
            sleep 1
          done
          pg_isready -h 127.0.0.1 -p 54322 -U postgres

      - name: Postgres diagnostics
        run: |
          psql -c "SELECT version();"
          psql -c "SELECT extname FROM pg_extension ORDER BY extname;"

      - name: Pre-migration setup (auth, storage, vault, cron, net stubs)
        # Cria schemas e funções auxiliares que as migrations esperam de um
        # ambiente Supabase real (auth.uid, vault.create_secret, cron.schedule
        # stub, net.http_post stub). Idempotente.
        run: |
          psql -v ON_ERROR_STOP=1 \
            -f supabase/functions/_tests/_rls_pre_migrate.sql

      - name: Apply migrations 000..016
        # 000_bootstrap.sql tenta `CREATE EXTENSION pg_cron` que vanilla
        # postgres:15 não tem — strip apenas essa linha; cron.schedule é
        # resolvido pelo stub do pre-migrate.
        run: |
          set -e
          for f in supabase/migrations/*.sql; do
            echo "→ applying $(basename "$f")"
            sed -e '/^CREATE EXTENSION IF NOT EXISTS pg_cron;/d' "$f" \
              | psql -v ON_ERROR_STOP=1
          done

      - name: Apply RLS test seed
        run: |
          psql -v ON_ERROR_STOP=1 \
            -f supabase/functions/_tests/_rls_seed.sql

      - name: Smoke — Deno connects to Postgres
        env:
          TEST_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:54322/postgres
        # Confirma que o driver consegue conectar antes de rodar a suite
        # completa — facilita debug se algo falhar no driver.
        run: |
          cat > /tmp/connect_smoke.ts <<'EOF'
          import { Client } from 'https://deno.land/x/postgres@v0.19.3/mod.ts';
          const url = Deno.env.get('TEST_DATABASE_URL')!;
          const u = new URL(url);
          const c = new Client({
            hostname: u.hostname,
            port: u.port ? Number(u.port) : 5432,
            user: decodeURIComponent(u.username),
            password: decodeURIComponent(u.password),
            database: u.pathname.replace(/^\//, '') || 'postgres',
            tls: { enabled: false },
          });
          await c.connect();
          const r = await c.queryArray<[number]>('SELECT 1');
          console.log('connect smoke: rows=', r.rows);
          const t = await c.queryArray<[number]>(
            "SELECT count(*) FROM tenants WHERE slug LIKE 'rls-test-%'",
          );
          console.log('seeded tenants=', t.rows);
          await c.end();
          EOF
          deno run --allow-net --allow-env --no-check /tmp/connect_smoke.ts

      - name: Run cross-tenant RLS suite
        env:
          TEST_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:54322/postgres
        # Esse passo é go-live blocker (AK-P0-04). Falha o merge se qualquer
        # tentativa cross-tenant retornar dado.
        run: |
          deno test --allow-net --allow-env --no-check \
            supabase/functions/_tests/rls-cross-tenant.test.ts
